<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <h1>Abastecimento</h1>
    <hr>
    <p>Escolha o tipo de combustível:</p>
    <ul>
        <li class="gasolina">Gasolina: R$ 6,69</li>
        <li class="etanol">Etanol: R$ 5,80</li>
        <li class="diesel">Diesel: R$ 6,20</li>
    </ul>
    <form id="formCombustivel">
        <label for="">Tipo de Combustível</label>
        <select name="combustivel" id="combustivel">
            <option value="">Selecione a opção</option>
            <option value="gasolina">Gasolina</option>
            <option value="etanol">Etanol</option>
            <option value="diesel">Diesel</option>
        </select>
        <label for="">Quantidade (litros):</label>
        <input type="number" id="litros" step="0.1" min="0">
    </form>
    <h2>Resultado</h2>
    <p id="resultado">R$</p>
    <script src="script.js"></script>
</body>
</html>
